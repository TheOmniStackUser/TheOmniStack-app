<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · TheOmniStack Tickets</title>
  <meta name="robots" content="noindex, nofollow" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        navy: { 900:'#0a1a35', 800:'#0f2547', 700:'#153060' },
        cyan: { 400:'#3ec8ff', 300:'#6fd9ff' }
      }}}
    }
  </script>
</head>
<body class="bg-navy-900 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-cyan-400 text-navy-900 text-2xl font-bold mb-4 shadow-lg">⚙</div>
      <h1 class="text-white text-xl font-bold tracking-tight">TheOmniStack</h1>
      <p class="text-gray-400 text-sm mt-1">Ticket-System für TheOmniStack</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">

      {% if error %}
      <div class="mb-5 flex items-center gap-2 bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl">
        <span>✕</span> {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="username">
            Benutzername/ E-Mail
          </label>
          <input
            type="text" id="username" name="username"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition"
            placeholder="name@beispiel.de"
            autocomplete="username"
            required
          />
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">
            Passwort
          </label>
          <input
            type="password" id="password" name="password"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-transparent transition"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit"
                class="w-full bg-navy-900 text-white font-bold py-3 px-6 rounded-xl hover:bg-navy-700 transition text-sm">
          Anmelden →
        </button>
      </form>

    </div>

  </div>

</body>
</html>
