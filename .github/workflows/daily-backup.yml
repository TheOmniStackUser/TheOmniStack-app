name: Daily System Backup

on:
  schedule:
    # Run at 03:00 UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run Backup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOURCE_S3_BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          set -e -o pipefail
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          BACKUP_DIR="/tmp/theomnistack_backup_$TIMESTAMP"
          DB_DUMP_FILE="$BACKUP_DIR/database_$TIMESTAMP.sql.gz"
          
          echo "Starting backup process at $TIMESTAMP..."
          mkdir -p "$BACKUP_DIR"
          
          # 1. PostgreSQL Backup (Using Postgres 16 Docker Image)
          echo "Dumping PostgreSQL database..."
          if docker run --rm postgres:16-alpine pg_dump "$DATABASE_URL" | gzip > "$DB_DUMP_FILE"; then
              echo "Database dump successful."
          else
              echo "Error: Database dump failed!"
              curl -s -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{
                  "from": "TheOmniStack Team <noreply@theomnistack.de>",
                  "to": "'"$ADMIN_EMAIL"'",
                  "subject": "❌ TheOmniStack Backup Failed",
                  "html": "<p>The automated backup failed during the database dump.</p>"
                }'
              exit 1
          fi
          
          # 2. Upload DB Backup to S3
          echo "Uploading database backup to S3..."
          if aws s3 cp "$DB_DUMP_FILE" "s3://$BACKUP_S3_BUCKET/database/database_$TIMESTAMP.sql.gz"; then
              echo "Database upload successful."
          else
              echo "Error: Database S3 upload failed!"
              exit 1
          fi
          
          # 3. S3 Documents Sync
          echo "Syncing S3 documents..."
          if aws s3 sync "s3://$SOURCE_S3_BUCKET" "s3://$BACKUP_S3_BUCKET/documents/"; then
              echo "S3 documents sync successful."
          else
              echo "Error: S3 documents sync failed!"
              exit 1
          fi
          
          # 4. Send Success Notification
          echo "Sending success notification..."
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "TheOmniStack Team <noreply@theomnistack.de>",
              "to": "'"$ADMIN_EMAIL"'",
              "subject": "✅ TheOmniStack Backup Successful",
              "html": "<p>The automated system backup completed successfully at '"$TIMESTAMP"'.</p>"
            }'
