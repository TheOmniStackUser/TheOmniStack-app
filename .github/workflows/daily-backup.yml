name: Daily System Backup

on:
  schedule:
    - cron: '19 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run Backup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SOURCE_S3_BUCKET: ${{ secrets.AWS_BUCKET_NAME }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
        run: |
          ADMIN_EMAIL=$(echo "$ADMIN_EMAIL" | tr -d '\r\n ')
          DATABASE_URL=$(echo "$DATABASE_URL" | tr -d '\r\n ')
          
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          BACKUP_DIR="/tmp/theomnistack_backup_$TIMESTAMP"
          DB_DUMP_FILE="$BACKUP_DIR/database_$TIMESTAMP.sql"
          
          echo "Starting backup process at $TIMESTAMP..."
          mkdir -p "$BACKUP_DIR"
          
          echo "Dumping PostgreSQL database (using Postgres 17)..."
          if docker run --rm postgres:17-alpine pg_dump "$DATABASE_URL" > "$DB_DUMP_FILE"; then
              echo "Database dump successful."
              gzip "$DB_DUMP_FILE"
              DB_DUMP_FILE="$DB_DUMP_FILE.gz"
          else
              echo "Error: Database dump failed!"
              curl -s -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{
                  "from": "TheOmniStack Team <noreply@theomnistack.de>",
                  "to": "'"$ADMIN_EMAIL"'",
                  "subject": "❌ TheOmniStack Backup Failed",
                  "html": "<p>The automated backup failed during the database dump.</p>"
                }'
              exit 1
          fi
          
          echo "Uploading database backup to S3..."
          if aws s3 cp "$DB_DUMP_FILE" "s3://$BACKUP_S3_BUCKET/database/database_$TIMESTAMP.sql.gz"; then
              echo "Database upload successful."
          else
              echo "Error: Database S3 upload failed!"
              exit 1
          fi
          
          echo "Syncing S3 documents..."
          if aws s3 sync "s3://$SOURCE_S3_BUCKET" "s3://$BACKUP_S3_BUCKET/documents/"; then
              echo "S3 documents sync successful."
          else
              echo "Error: S3 documents sync failed!"
              exit 1
          fi
          
          echo "Sending success notification to $ADMIN_EMAIL..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "TheOmniStack Team <noreply@theomnistack.de>",
              "to": "'"$ADMIN_EMAIL"'",
              "subject": "✅ TheOmniStack Backup Successful",
              "html": "<p>The automated system backup completed successfully at '"$TIMESTAMP"'.</p>"
            }')
          echo "Resend API Response: $RESPONSE"
